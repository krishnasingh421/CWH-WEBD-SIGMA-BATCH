<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>CSS selectors</title>
        <style>
            /*Element selector*/
            div {
                /*background-color: red;*/
            }
            /*Class Selector*/
            .red {
                background-color: red;
            }
            /*ID selector*/
            #green {
                background-color: green;
            }
            /*Child Selector*/
            div > p {
                background-color: brown;
                color: blue;
            }
            /*Descendent Selector*/
            div p {
                background-color: brown;
                color: blue;
            }
            /*Universal Selector*/
            * {
                margin: 0;
                padding: 0;
            }
            /*pseudo selector*/
            a:visited {
                color: yellow;
            }
            a:link {
                color: green;
            }
            a:active {
                background-color: red;
            }
            a:hover {
                background-color: yellow;
            }
            p:first-child {
                background-color: aqua;
            }
        </style>
    </head>
    <body>
        <main class="one">
            <p>I am one.</p>
            <p>I am two.</p>
        </main>
        <div class="red">
            I am a div.
            <article>
                <p>I am a para inside div.</p>
            </article>
        </div>
        <div id="green">I am another div.</div>
        <a href="https://www.google.com">Go to Google</a>
        <a href="https://www.facebook.com">Go to Facebook</a>
    </body>
</html>
